'# VARIANT_METADATA':
  description: Quick trades with shorter cooldowns
  target: 5-10 trades/day, ~60% win rate, consistent returns
  variant_name: Fast Scalping
  variant_number: 5
data_collection:
  backup_frequency: 24
  compression: true
  historical_days: 30
  store_raw_data: true
  update_frequency: 300
market_conditions:
  avoid_sessions: []
  breakout_threshold: 0.0015
  preferred_sessions: []
  ranging_threshold: 0.0008
  trend_strength_threshold: 0.6
  volatility_threshold: 0.0008
multi_timeframe:
  consensus_threshold: 0.4
  enabled: true
  minimum_timeframes: 1
  timeframes:
  - M5
  - M15
  weights:
    M15: 0.6
    M5: 0.4
notifications:
  email:
    daily_summary: true
    enabled: true
    trade_alerts: true
  loop_reports:
    enabled: true
    include_performance: true
    send_on_error: true
  manual_trade_approval: true
  notification_cooldown: 300
  pre_trade_cooldown_seconds: 0
  telegram:
    enabled: true
    send_analysis: true
    send_charts: true
performance:
  generate_reports: true
  report_frequency: daily
  save_trades: true
  track_metrics: true
risk_management:
  consecutive_loss_limit: 3
  correlation_limit: 0.6
  daily_loss_cooldown_minutes: 60
  loss_scale_down_pct: 50
  max_daily_loss: 2.5
  max_open_trades: 2
  max_position_size: 2.0
  scale_down_after_losses: true
  stop_loss_atr_multiplier: 1.5
  trailing_stop: true
  trailing_stop_atr_multiplier: 1.0
simulation:
  csv_dir: data
  data_source: db
  enabled: true
strategy_portfolio:
  enabled: true
  intraday_rules:
    avoid_news_minutes: 15
    force_close_time: '16:30'
    max_hold_minutes: 240
    max_trades_per_session: 3
    min_time_between_trades: 10
  mode: intraday
  rebalancing:
    enabled: false
    frequency_days: 30
    max_allocation: 25
    method: performance_based
    min_allocation: 5
  selection:
    confidence_weighting: true
    min_strategies_agreeing: 2
    mode: weighted_ensemble
    timeframe_priority:
    - M5
    - M15
    - M1
  strategies:
  - allocation: 8
    conditions:
    - TRENDING_UP
    - TRENDING_DOWN
    min_confidence: 0.65
    name: Fast_EMA_Cross_M5
    parameters:
      ema_fast: 8
      ema_slow: 21
    timeframes:
    - M5
    - M15
    type: trend_momentum
  - allocation: 8
    conditions:
    - TRENDING_UP
    - TRENDING_DOWN
    min_confidence: 0.6
    name: MACD_Momentum_M5
    parameters:
      fast: 12
      histogram_threshold: 5.0e-05
      signal: 9
      slow: 26
    timeframes:
    - M5
    type: trend_momentum
  - allocation: 7
    conditions:
    - TRENDING_UP
    - TRENDING_DOWN
    min_confidence: 0.65
    name: ADX_Trend_M5
    parameters:
      period: 14
      threshold: 20
    timeframes:
    - M5
    - M15
    type: trend_momentum
  - allocation: 7
    conditions:
    - TRENDING_UP
    - TRENDING_DOWN
    - BREAKOUT
    min_confidence: 0.7
    name: Fast_Ichimoku
    parameters:
      kijun: 13
      senkou: 26
      tenkan: 5
    timeframes:
    - M5
    - M15
    type: trend_momentum
  - allocation: 10
    conditions:
    - RANGING
    min_confidence: 0.6
    name: BB_Bounce_M5
    parameters:
      period: 20
      std_dev: 2
      touch_threshold: 0.001
    timeframes:
    - M5
    type: mean_reversion
  - allocation: 8
    conditions:
    - RANGING
    min_confidence: 0.65
    name: RSI_Extremes
    parameters:
      extreme_overbought: 75
      extreme_oversold: 25
      overbought: 65
      oversold: 35
      period: 14
    timeframes:
    - M5
    type: mean_reversion
  - allocation: 7
    conditions:
    - RANGING
    min_confidence: 0.6
    name: Fast_Stochastic
    parameters:
      d_period: 3
      k_period: 5
      smooth: 3
    timeframes:
    - M5
    type: mean_reversion
  - allocation: 7
    conditions:
    - VOLATILE
    - BREAKOUT
    min_confidence: 0.7
    name: ATR_Breakout
    parameters:
      atr_period: 14
      lookback: 20
      multiplier: 1.5
    timeframes:
    - M5
    - M15
    type: breakout
  - allocation: 7
    conditions:
    - BREAKOUT
    min_confidence: 0.65
    name: Support_Resistance_Break
    parameters:
      break_threshold: 0.0005
      confirmation_candles: 1
      lookback_periods: 50
    timeframes:
    - M5
    - M15
    type: breakout
  - allocation: 6
    conditions:
    - BREAKOUT
    - RANGING
    min_confidence: 0.65
    name: Donchian_Break
    parameters:
      exit_period: 5
      period: 10
    timeframes:
    - M5
    type: breakout
  - allocation: 5
    conditions:
    - ALL
    hold_time_override:
    - 5
    - 30
    min_confidence: 0.7
    name: Price_Action_Scalp
    parameters:
      min_body_ratio: 0.6
      min_wick_ratio: 2.0
    timeframes:
    - M1
    - M5
    type: scalping
  - allocation: 5
    conditions:
    - ALL
    hold_time_override:
    - 5
    - 45
    min_confidence: 0.65
    name: Spread_Squeeze
    parameters:
      max_spread_pips: 1.5
      volume_spike_threshold: 1.5
    timeframes:
    - M1
    - M5
    type: scalping
  - allocation: 5
    conditions:
    - ALL
    hold_time_override:
    - 10
    - 60
    min_confidence: 0.7
    name: Order_Flow_Momentum
    parameters:
      imbalance_threshold: 0.6
      lookback: 5
    timeframes:
    - M1
    - M5
    type: scalping
  - active_hours:
    - 08:00-16:00
    allocation: 5
    conditions:
    - BREAKOUT
    min_confidence: 0.7
    name: London_Open_Break
    parameters:
      min_range_pips: 10
      range_period_minutes: 60
      session_start: 08:00
    timeframes:
    - M5
    - M15
    type: session_based
  - active_hours:
    - 13:00-14:00
    allocation: 5
    conditions:
    - TRENDING_UP
    - TRENDING_DOWN
    min_confidence: 0.7
    name: NY_Open_Momentum
    parameters:
      min_momentum_pips: 8
      momentum_period_minutes: 30
      session_start: '13:00'
    timeframes:
    - M5
    type: session_based
technical_analysis:
  analysis_frequency: 300
  atr_multiplier: 2.0
  bollinger_threshold: 0.03
  confidence_threshold: 0.4
  include_market_context: true
  include_volume_analysis: true
  macd_signal_threshold: 0.0001
  min_confluence_score: 0.3
  min_signals_required: 1
  minimum_confidence: 0.4
  ranging_confidence_penalty: 0.05
  risk_reward_ratio_minimum: 1.1
  rsi_overbought: 68
  rsi_oversold: 48
  signal_strength_threshold: 0.005
  signal_thresholds:
    buy: 0.6
    neutral: 0.4
    sell: 0.6
    strong_buy: 0.8
    strong_sell: 0.8
  trade_cooldown_minutes: 10
trading:
  default_timeframe: M5
  hold_time_settings:
    default_hold_time_minutes: 90
    force_close_enabled: true
    force_close_time: '16:30'
    market_condition_hold_times:
      breakout:
      - 90
      - 240
      news_reactionary:
      - 20
      - 180
      ranging:
      - 20
      - 180
      reversal:
      - 60
      - 240
    max_hold_time_minutes: 240
    min_hold_time_minutes: 20
  max_trades_per_day: 6
  pairs:
  - EUR_USD
  - GBP_USD
  - USD_JPY
  risk_percentage: 1.5
